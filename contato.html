<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de Eletrônicos Online - Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Loja de Eletrônicos Online</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="produtos.html">Produtos</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1 class="page-title">Fale Conosco</h1>

        <section>
            <p style="text-align: center; font-size: 1.2rem; margin-bottom: 30px;">
                Preencha o formulário abaixo para entrar em contato com nossa equipe.
            </p>

            <form class="contact-form" action="#" method="get">
                <div class="form-group">
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required autofocus autocomplete="name">
                </div>

                <div class="form-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" placeholder="exemplo@dominio.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="telefone">Telefone:</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999" pattern="[0-9() -]+" required autocomplete="tel">
                </div>

                <div class="form-group">
                    <label for="assunto">Assunto:</label>
                    <select id="assunto" name="assunto" required>
                        <option value="" disabled selected>Selecione um assunto</option>
                        <option value="duvida">Dúvida sobre produto</option>
                        <option value="suporte">Suporte técnico</option>
                        <option value="reclamacao">Reclamação</option>
                        <option value="outro">Outro</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="mensagem">Mensagem:</label>
                    <textarea id="mensagem" name="mensagem" placeholder="Descreva sua solicitação aqui..." required maxlength="500"></textarea>
                </div>

                <button type="submit">Enviar Mensagem</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Loja de Eletrônicos Online. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
